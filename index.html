<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    #yt-player { 
        position: absolute;
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1.05, 1.85);
    }
</style>
</head>
<body>
    <!-- SimCaster-Prinzip: Ein leerer Div-Container, der von der Google API kontrolliert wird -->
    <div id="video-container">
        <div id="yt-player"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let vID = urlParams.get('v');
        const listID = urlParams.get('list');

        let playlistArray = [];

        // Notecard-Weichen und Listen-Splitting verarbeiten
        if (vID) {
            if (vID.includes(',')) {
                playlistArray = vID.split(',');
                vID = playlistArray[0]; // Erstes Video als Startpunkt
            } else if (vID.startsWith("/watch?v=")) {
                vID = vID.split('v=')[1];
            }
        }

        // 1. Lädt die offizielle YouTube IFrame-Player-API im Hintergrund
        const tag = document.createElement('script');
        tag.src = "https://youtube.com";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        // 2. Diese Funktion wird automatisch von Google ausgeführt, sobald die API bereit ist
        window.onYouTubeIframeAPIReady = function() {
            if (!vID && !listID) return;

            // Player-Konfiguration (SimCaster-Setup für TV-Tarnung)
            const playerConfig = {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 0,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'origin': window.location.origin // Legitimiert den Second Life Browser bei Google
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            };

            // Unterscheidung zwischen klassischer Playlist und Einzelvideo/Notecard-Liste
            if (listID) {
                playerConfig.playerVars.listType = 'playlist';
                playerConfig.playerVars.list = listID.includes('list=') ? listID.split('list=')[1] : listID;
            } else {
                playerConfig.videoId = vID;
                if (playlistArray.length > 1) {
                    playerConfig.playerVars.playlist = playlistArray.join(',');
                } else {
                    playerConfig.playerVars.loop = 1;
                    playerConfig.playerVars.playlist = vID; // Loop benötigt zwingend die ID als eigene Playlist
                }
            }

            // Erstellt den getarnten Player im video-container
            player = new YT.Player('yt-player', playerConfig);
        };

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // 3. Überwacht den Videostatus (Werbeunterbrechungen abfangen)
        function onPlayerStateChange(event) {
            // Wenn das Video läuft (Status 1), prüfen wir, ob die YouTube-Werbe-Schnittstelle feuert
            if (event.data == YT.PlayerState.PLAYING) {
                const iframe = document.getElementById('yt-player');
                if (iframe && iframe.contentWindow) {
                    try {
                        // Schneller automatischer Skip-Befehl bei Ads
                        const skipBtn = iframe.contentWindow.document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern');
                        if (skipBtn) skipBtn.click();
                    } catch(e) {
                        // CORS-Catch: Falls Google blockiert, regelt die API das Video nativ weiter
                    }
                }
            }
            // Endlos-Loop Absicherung für Notecards
            if (event.data == YT.PlayerState.ENDED && playlistArray.length <= 1 && !listID) {
                player.cueVideoById({videoId: vID});
                player.playVideo();
            }
        }
    </script>
</body>
</html>
