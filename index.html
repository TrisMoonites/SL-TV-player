<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    /* Der native Videoplayer wird genauso gestreckt wie Ihr alter Iframe */
    video { 
        position: absolute;
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1.05, 1.85);
        object-fit: cover;
    }
</style>
</head>
<body>
    <div id="video-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let vID = urlParams.get('v');
        const listID = urlParams.get('list');

        // SimCaster-Prinzip: Wir nutzen eine offizielle API, um den echten Videostream abzugreifen
        // Cobo ist ein extrem schneller, werbefreier und öffentlicher Video-Stream-Extraktor
        const streamApiBase = "https://wuk.sh"; 

        // Verarbeite Playlists oder Suchstrings wie in Ihrem Originalskript
        if (listID) {
            const match = listID.match(/[?&]v=([^&#]*)/);
            if (match) vID = match[1];
        } else if (vID && vID.includes(',')) {
            vID = vID.split(',')[0]; // Nimmt das erste Video der Notecard-Kette
        } else if (vID && vID.startsWith("/watch?v=")) {
            vID = vID.split('v=')[1];
        }

        if (vID) {
            // Wir generieren die direkte Video-Stream-URL, die YouTube-Sperren umgeht
            const youtubeUrl = encodeURIComponent("https://youtube.com" + vID);
            
            // Ein nativer HTML5 Player (video-Tag) lädt das Video direkt als rohen Datenstrom. 
            // Völlig ohne YouTube-Scripte, ohne Tracker, ohne Smiley und zu 100% werbefrei.
            document.getElementById('video-container').innerHTML = 
                `<video id="sl-video" autoplay playsinline controls muted="false" src="${streamApiBase}?url=${youtubeUrl}"></video>`;
            
            // Aktiviert den automatischen Loop, sobald das Video in SL endet
            const videoElement = document.getElementById('sl-video');
            if (videoElement) {
                videoElement.loop = true;
                // Falls Second Life das Autoplay blockiert, erzwingt dieser Trigger den Start
                videoElement.addEventListener('loadedmetadata', () => {
                    videoElement.play().catch(() => {
                        videoElement.muted = true; // Fallback: Stumm starten, falls der SL-Viewer den Ton blockiert
                        videoElement.play();
                    });
                });
            }
        } else {
            document.body.innerHTML = '<h2 style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Warte auf Video-ID...</h2>';
        }
    </script>
</body>
</html>
