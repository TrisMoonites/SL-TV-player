<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    iframe { 
        position: absolute;
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1.05, 1.85);
    }
</style>
</head>
<body>
    <div id="video-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('v');
        const listID = urlParams.get('list');

        let embedUrl = "";
        const baseDomain = "https://youtube-nocookie.com";
        
        // Internationaler Werbe-Schutz: Zwingt YouTube dazu, europäische Werberegeln anzuwenden
        // &hl=de schaltet die Werbe-Injektionen für US-IP-Adressen weitgehend ab
        const geoParams = "&hl=de&cc_lang_pref=de&disablekb=1" + (window.location.protocol === 'https:' ? '&restrict_sr=1' : '');

        if (listID) {
            embedUrl = baseDomain + "/embed/videoseries?" + listID + "&autoplay=1&mute=0&rel=0&modestbranding=1" + geoParams;
        } else if (vID) {
            if (vID.includes(',')) {
                const ids = vID.split(',');
                embedUrl = baseDomain + "/embed/" + ids[0] + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID + geoParams;
            } else if (vID.length < 15) {
                embedUrl = baseDomain + "/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID + geoParams;
            } else {
                if (vID.startsWith("/watch?v=")) {
                    embedUrl = baseDomain + "/embed/" + vID.split('v=')[1] + "?autoplay=1&mute=0&rel=0&modestbranding=1" + geoParams;
                } else {
                    embedUrl = baseDomain + "/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1" + geoParams;
                }
            }
        }

        if (embedUrl) {
            // "allow-same-origin" wurde entfernt. Das bewirkt das "Sprengen" der US-Werbe-Skripte im Firestorm-Viewer
            document.getElementById('video-container').innerHTML = 
                `<iframe src="${embedUrl}" 
                         allow="autoplay; encrypted-media; picture-in-picture" 
                         referrerpolicy="strict-origin-when-cross-origin" 
                         sandbox="allow-scripts opacity allow-presentation"
                         allowfullscreen></iframe>`;
        } else {
            document.body.innerHTML = '<h2 style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Warte auf Video-ID...</h2>';
        }
    </script>
</body>
</html>
