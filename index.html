<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    iframe { 
        position: absolute;
        /* Wir machen den Iframe breiter und höher als nötig */
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        /* 
           scale(1.05, 1.15) streckt das Video:
           1.05 = 5% breiter (X-Achse)
           1.15 = 15% höher (Y-Achse)
        */
        transform: translate(-50%, -50%) scale(1.05, 1.85);
    }
</style>
</head>
<body>
    <div id="video-container">
        <h2 id="status-text" style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Suche besten werbefreien Server...</h2>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('v');
        const listID = urlParams.get('list');

        // Eine Liste der aktuell stabilsten, öffentlichen Invidious-Instanzen
        const instances = [
            "https://yewtu.be",
            "https://nerdvpn.de",
            "https://tux.digital",
            "https://flokinet.to",
            "https://melmac.space"
        ];

        // Funktion um die schnellste Instanz zu ermitteln
        async function getFastestInstance() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2500); // 2.5 Sekunden Limit pro Server

            try {
                // Erstellt parallele Anfragen an alle Server. Der schnellste gewinnt!
                const fastest = await Promise.any(
                    instances.map(async (url) => {
                        const res = await fetch(`${url}/api/v1/health`, { 
                            method: 'GET', 
                            signal: controller.signal,
                            mode: 'cors'
                        });
                        if (res.ok) return url;
                        throw new Error('Server ungesund');
                    })
                );
                clearTimeout(timeoutId);
                return fastest;
            } catch (e) {
                // Fallback falls alle Pings blockiert werden oder fehlschlagen
                clearTimeout(timeoutId);
                return instances[0]; 
            }
        }

        async function startPlayer() {
            if (!vID && !listID) {
                document.getElementById('video-container').innerHTML = '<h2 style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Warte auf Video-ID...</h2>';
                return;
            }

            // Ermittle dynamisch die beste Instanz
            const proxyBase = await getFastestInstance();
            let embedUrl = "";

            if (listID) {
                // Unterstützung für echte YouTube Playlists (list=)
                embedUrl = proxyBase + listID + "&autoplay=1&mute=0&quality=dash";
            } else if (vID) {
                if (vID.includes(',')) {
                    // Unterstützung für Listen aus Notecards (v=ID1,ID2,ID3)
                    const ids = vID.split(',');
                    embedUrl = proxyBase + "/embed/" + ids[0] + "?autoplay=1&mute=0&quality=dash";
                } else if (vID.length < 15) {
                    // Standard Einzelvideo-Loop
                    embedUrl = proxyBase + "/embed/" + vID + "?autoplay=1&mute=0&loop=1&quality=dash";
                } else {
                    // Unterstützung für die Suchfunktion (Punkt 6)
                    if (vID.startsWith("/watch?v=")) {
                        embedUrl = proxyBase + "/embed/" + vID.split('v=')[1] + "?autoplay=1&mute=0&quality=dash";
                    } else {
                        embedUrl = proxyBase + "/embed/" + vID + "?autoplay=1&mute=0&quality=dash";
                    }
                }
            }

            if (embedUrl) {
                document.getElementById('video-container').innerHTML = 
                    `<iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            }
        }

        // Startet die Serverprüfung und lädt anschließend das Video
        startPlayer();
    </script>
</body>
</html>
