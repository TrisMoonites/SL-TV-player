<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    iframe { 
        position: absolute;
        /* Wir machen den Iframe breiter und höher als nötig */
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        /* 
           scale(1.05, 1.15) streckt das Video:
           1.05 = 5% breiter (X-Achse)
           1.15 = 15% höher (Y-Achse)
        */
        transform: translate(-50%, -50%) scale(1.05, 1.85);
    }
</style>
</head>
<body>
    <div id="video-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('v');
        const listID = urlParams.get('list');

        let embedUrl = "";

        if (listID) {
            // Unterstützung für echte YouTube Playlists (list=)
            embedUrl = "https://www.youtube.com" + listID + "&autoplay=1&mute=0&rel=0&modestbranding=1";
        } else if (vID) {
            if (vID.includes(',')) {
                // Unterstützung für Listen aus Notecards (v=ID1,ID2,ID3)
                const ids = vID.split(',');
                // Erstes Video als Start-ID, die gesamte Kette (vID) als Playlist für den Loop
                embedUrl = "https://www.youtube.com/embed/" + ids[0] + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID;
            } else if (vID.length < 15) {
                // Standard Einzelvideo-Loop
                embedUrl = "https://www.youtube.com/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID;
            } else {
                // Unterstützung für die Suchfunktion (Punkt 6)
                // Sicherstellen, dass /embed/ vorhanden ist, falls vID nur die ID ist
                if (vID.startsWith("/watch?v=")) {
                    embedUrl = "https://www.youtube.com/embed/" + vID.split('v=')[1] + "?autoplay=1&mute=0&rel=0&modestbranding=1";
                } else {
                    embedUrl = "https://www.youtube.com/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1";
                }
            }
        }

        if (embedUrl) {
            // ID Attribut "yt-player" hinzugefügt und Parameter &enablejsapi=1 angehängt für die Werbe-Erkennung
            const separator = embedUrl.includes('?') ? '&' : '?';
            document.getElementById('video-container').innerHTML = 
                `<iframe id="yt-player" src="${embedUrl}${separator}enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            
            // Automatische Werbeüberwachung für Second Life (Dullahan/CEF Browser)
            setInterval(() => {
                try {
                    const iframe = document.getElementById('yt-player');
                    if (iframe && iframe.contentWindow) {
                        // Simuliert das Klicken des nativen "Überspringen"-Buttons im YouTube-Iframe
                        const skipBtn = iframe.contentWindow.document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern');
                        if (skipBtn) { 
                            skipBtn.click(); 
                        }
                        
                        // Erkennt, ob eine Werbekomponente aktiv geladen ist
                        const adContainer = iframe.contentWindow.document.querySelector('.video-ads, .ytp-ad-player-overlay');
                        const videoTag = iframe.contentWindow.document.querySelector('video');
                        
                        if (videoTag && adContainer && adContainer.children.length > 0) {
                            // Spult die nicht-überspringbare Werbung sofort an das vorderste Ende vor
                            videoTag.playbackRate = 16.0; 
                            videoTag.currentTime = videoTag.duration - 0.1;
                        }
                    }
                } catch (e) {
                    // Verhindert Konsolenfehler, falls die Browser-Sicherheitsrichtlinien (Same-Origin) temporär blockieren
                }
            }, 300);

        } else {
            document.body.innerHTML = '<h2 style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Warte auf Video-ID...</h2>';
        }
    </script>
</body>
</html>
