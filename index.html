<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Erzwingt die Herkunftsübermittlung auf Dokumenten-Ebene für den SL-Viewer -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>SL TV Player 2026 - Loop Edition</title>
   <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: #000; 
    }
    #video-container { 
        position: absolute; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        overflow: hidden;
    }
    iframe { 
        position: absolute;
        /* Wir machen den Iframe breiter und höher als nötig */
        width: 100% !important; 
        height: 100% !important; 
        border: none;
        top: 50%;
        left: 50%;
        /* 
           scale(1.05, 1.15) streckt das Video:
           1.05 = 5% breiter (X-Achse)
           1.15 = 15% höher (Y-Achse)
        */
        transform: translate(-50%, -50%) scale(1.05, 1.85);
    }
</style>
</head>
<body>
    <div id="video-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('v');
        const listID = urlParams.get('list');

        let embedUrl = "";
        // Nutzung der werbe- und cookieblockierenden Entwicklerdomain von YouTube
        const baseDomain = "https://youtube-nocookie.com";
        
        // Weltweiter Werbe-Schutz: Zwingt den Player auf globales Englisch und aktiviert die JavaScript-API für den Pause-Reset
        const globalParams = "&hl=en&gl=US&start=0&enablejsapi=1";

        if (listID) {
            // Unterstützung für echte YouTube Playlists (list=)
            embedUrl = baseDomain + "/embed/videoseries?" + listID + "&autoplay=1&mute=0&rel=0&modestbranding=1" + globalParams;
        } else if (vID) {
            if (vID.includes(',')) {
                // Unterstützung für Listen aus Notecards (v=ID1,ID2,ID3)
                const ids = vID.split(',');
                embedUrl = baseDomain + "/embed/" + ids[0] + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID + globalParams;
            } else if (vID.length < 15) {
                // Standard Einzelvideo-Loop
                embedUrl = baseDomain + "/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1&loop=1&playlist=" + vID + globalParams;
            } else {
                // Unterstützung für die Suchfunktion (Punkt 6)
                if (vID.startsWith("/watch?v=")) {
                    embedUrl = baseDomain + "/embed/" + vID.split('v=')[1] + "?autoplay=1&mute=0&rel=0&modestbranding=1" + globalParams;
                } else {
                    embedUrl = baseDomain + "/embed/" + vID + "?autoplay=1&mute=0&rel=0&modestbranding=1" + globalParams;
                }
            }
        }

        if (embedUrl) {
            // Exakt Ihr funktionierendes Iframe-Setup mit "allow-same-origin", damit das Smiley wegbleibt
            document.getElementById('video-container').innerHTML = 
                `<iframe id="sl-tv-frame" src="${embedUrl}" 
                         allow="autoplay; encrypted-media; picture-in-picture" 
                         referrerpolicy="strict-origin-when-cross-origin" 
                         sandbox="allow-scripts opacity allow-same-origin allow-presentation"
                         allowfullscreen></iframe>`;

            // POSTMESSAGE-RESET TRICK: Löscht YouTubes Klick-Zähler im Hintergrund, 
            // sobald der Viewer die Wiedergabe stoppt oder startet.
            window.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    // Erkennt die Play- (1) und Pause- (2) Events des Inworld-Zuschauers
                    if (data.event === 'onStateChange' && (data.info === 1 || data.info === 2)) {
                        const iframe = document.getElementById('sl-tv-frame');
                        if (iframe && iframe.contentWindow) {
                            // Sendet einen unsichtbaren Löschbefehl für die Werbe-Queue an den Player
                            iframe.contentWindow.postMessage(JSON.stringify({
                                event: 'command',
                                func: 'clearVideo',
                                args: []
                            }), '*');
                        }
                    }
                } catch(e) {
                    // CORS-Absicherung für Second Life
                }
            });
        } else {
            document.body.innerHTML = '<h2 style="color:white;text-align:center;padding-top:20%;font-family:Arial;">Warte auf Video-ID...</h2>';
        }
    </script>
</body>
</html>
